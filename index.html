<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Status CCTV - UCS KPA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f6f9; color: #222; padding: 20px; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #1a1a2e; }
.subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
.metric-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.metric { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e5e7eb; }
.metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.metric-val { font-size: 26px; font-weight: 600; }
.metric-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #d1d5db; background: #fff; color: #555; font-size: 12px; cursor: pointer; }
.filter-btn.active { background: #185FA5; color: #fff; border-color: #185FA5; }
.chart-row { display: grid; grid-template-columns: 1.6fr 1fr; gap: 14px; margin-bottom: 20px; }
.card { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #e5e7eb; }
.card-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.04em; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { font-size: 12px; color: #555; width: 130px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: #f0f0f0; border-radius: 4px; height: 10px; }
.bar-fill { height: 100%; border-radius: 4px; background: #E24B4A; }
.bar-count { font-size: 12px; color: #777; width: 45px; text-align: right; }
.location-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 10px; }
.loc-card { background: #fff; border-radius: 10px; padding: 12px 14px; border: 1px solid #e5e7eb; border-left: 4px solid #639922; }
.loc-card.has-rosak { border-left-color: #E24B4A; }
.loc-name { font-size: 13px; font-weight: 600; color: #222; margin-bottom: 8px; }
.loc-row { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 3px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-rosak { background: #FCEBEB; color: #A32D2D; }
.badge-ok { background: #EAF3DE; color: #3B6D11; }
.section-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
@media (max-width: 700px) {
  .metric-row { grid-template-columns: repeat(2,1fr); }
  .chart-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>Dashboard Status CCTV — UCS KPA</h1>
<p class="subtitle">Pemantauan kerosakan channel CCTV mengikut lokasi &nbsp;|&nbsp; Jumlah keseluruhan: 215 channel</p>

<div class="metric-row" id="metrics"></div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all')">Semua</button>
  <button class="filter-btn" onclick="setFilter('KOLEJ RAFFLESIA')">Kolej Rafflesia</button>
  <button class="filter-btn" onclick="setFilter('KOLEJ ANGSANA')">Kolej Angsana</button>
  <button class="filter-btn" onclick="setFilter('FAKULTI FARMASI')">Fak. Farmasi</button>
  <button class="filter-btn" onclick="setFilter('FAKULTI SAINS KESIHATAN')">Fak. Sains Kesihatan</button>
  <button class="filter-btn" onclick="setFilter('FAKULTI PFI (CASUARINA)')">Fak. PFI</button>
  <button class="filter-btn" onclick="setFilter('ALAM BINA DVR1')">Alam Bina DVR1</button>
  <button class="filter-btn" onclick="setFilter('ALAM BINA DVR2')">Alam Bina DVR2</button>
  <button class="filter-btn" onclick="setFilter('KOLEJ DAHLIA')">Kolej Dahlia</button>
  <button class="filter-btn" onclick="setFilter('PINTU KEDUA UCS')">Pintu Kedua</button>
</div>

<div class="chart-row">
  <div class="card">
    <div class="card-title">Kadar kerosakan mengikut kawasan (%)</div>
    <div id="bar-chart"></div>
  </div>
  <div class="card">
    <div class="card-title">Nisbah channel keseluruhan</div>
    <div style="position:relative;height:200px">
      <canvas id="pieChart" role="img" aria-label="Carta pai nisbah channel rosak vs baik"></canvas>
    </div>
    <div id="pie-legend" style="display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:12px;color:#666;"></div>
  </div>
</div>

<div class="section-title">Status mengikut lokasi</div>
<div class="location-grid" id="loc-grid"></div>

<script>
const allData = [
  { kawasan: 'KOLEJ RAFFLESIA',        lokasi: 'Rafflesia 1',           total: 3,  rosak: 0 },
  { kawasan: 'KOLEJ RAFFLESIA',        lokasi: 'Rafflesia 2',           total: 3,  rosak: 1 },
  { kawasan: 'KOLEJ RAFFLESIA',        lokasi: 'Rafflesia 3',           total: 3,  rosak: 0 },
  { kawasan: 'KOLEJ RAFFLESIA',        lokasi: 'Rafflesia 4',           total: 3,  rosak: 2 },
  { kawasan: 'KOLEJ RAFFLESIA',        lokasi: 'Rafflesia 5',           total: 3,  rosak: 0 },
  { kawasan: 'KOLEJ RAFFLESIA',        lokasi: 'Rafflesia 6',           total: 3,  rosak: 2 },
  { kawasan: 'KOLEJ ANGSANA',          lokasi: 'Angsana 1',             total: 3,  rosak: 3 },
  { kawasan: 'KOLEJ ANGSANA',          lokasi: 'Angsana 2',             total: 3,  rosak: 3 },
  { kawasan: 'KOLEJ ANGSANA',          lokasi: 'Angsana 3',             total: 3,  rosak: 3 },
  { kawasan: 'KOLEJ ANGSANA',          lokasi: 'Angsana 4',             total: 3,  rosak: 3 },
  { kawasan: 'KOLEJ ANGSANA',          lokasi: 'Angsana 5',             total: 3,  rosak: 3 },
  { kawasan: 'FAKULTI FARMASI',        lokasi: 'FF1',                   total: 4,  rosak: 0 },
  { kawasan: 'FAKULTI FARMASI',        lokasi: 'FF2, FF3',              total: 11, rosak: 5 },
  { kawasan: 'FAKULTI FARMASI',        lokasi: 'FF4',                   total: 4,  rosak: 0 },
  { kawasan: 'FAKULTI SAINS KESIHATAN',lokasi: 'FSK 2,3,4',            total: 14, rosak: 5 },
  { kawasan: 'FAKULTI SAINS KESIHATAN',lokasi: 'FSK6A',                 total: 8,  rosak: 3 },
  { kawasan: 'PINTU KEDUA UCS',        lokasi: 'Pintu Kedua',           total: 9,  rosak: 0 },
  { kawasan: 'ALAM BINA DVR1',         lokasi: 'FSPU/FSSR/Dewan (DVR1)',total: 39, rosak: 9 },
  { kawasan: 'ALAM BINA DVR2',         lokasi: 'Pelbagai Lokasi (DVR2)',total: 40, rosak: 3 },
  { kawasan: 'KOLEJ DAHLIA',           lokasi: 'Dahlia 1-4',            total: 24, rosak: 0 },
  { kawasan: 'FAKULTI PFI (CASUARINA)',lokasi: 'ACC / FPP / FPHP',      total: 18, rosak: 0 },
  { kawasan: 'FAKULTI PFI (CASUARINA)',lokasi: 'PTAR / PKP / DSG',      total: 11, rosak: 0 },
];

const kawasanList = [...new Set(allData.map(d => d.kawasan))];
let currentFilter = 'all';
let pieChart = null;

function pct(r, t) { return t ? Math.round(r / t * 100) : 0; }

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const labelMap = {
      'all':'Semua','KOLEJ RAFFLESIA':'Kolej Rafflesia','KOLEJ ANGSANA':'Kolej Angsana',
      'FAKULTI FARMASI':'Fak. Farmasi','FAKULTI SAINS KESIHATAN':'Fak. Sains Kesihatan',
      'FAKULTI PFI (CASUARINA)':'Fak. PFI','ALAM BINA DVR1':'Alam Bina DVR1',
      'ALAM BINA DVR2':'Alam Bina DVR2','KOLEJ DAHLIA':'Kolej Dahlia','PINTU KEDUA UCS':'Pintu Kedua'
    };
    b.classList.toggle('active', b.textContent.trim() === labelMap[f]);
  });
  render();
}

function render() {
  const filtered = currentFilter === 'all' ? allData : allData.filter(d => d.kawasan === currentFilter);
  const total = filtered.reduce((s,d)=>s+d.total,0);
  const rosak = filtered.reduce((s,d)=>s+d.rosak,0);
  const baik = total - rosak;
  const lokRosak = filtered.filter(d=>d.rosak>0).length;

  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">Jumlah channel</div>
      <div class="metric-val">${total}</div>
      <div class="metric-sub">${filtered.length} lokasi dipantau</div>
    </div>
    <div class="metric">
      <div class="metric-label" style="color:#A32D2D">Channel rosak</div>
      <div class="metric-val" style="color:#E24B4A">${rosak}</div>
      <div class="metric-sub">${pct(rosak,total)}% daripada jumlah</div>
    </div>
    <div class="metric">
      <div class="metric-label" style="color:#3B6D11">Channel berfungsi</div>
      <div class="metric-val" style="color:#639922">${baik}</div>
      <div class="metric-sub">${pct(baik,total)}% beroperasi</div>
    </div>
    <div class="metric">
      <div class="metric-label">Lokasi terjejas</div>
      <div class="metric-val">${lokRosak}</div>
      <div class="metric-sub">daripada ${filtered.length} lokasi</div>
    </div>
  `;

  document.getElementById('loc-grid').innerHTML = filtered.map(d => `
    <div class="loc-card ${d.rosak>0?'has-rosak':''}">
      <div class="loc-name">${d.lokasi}</div>
      <div class="loc-row"><span>Jumlah channel</span><span>${d.total}</span></div>
      <div class="loc-row"><span>Channel rosak</span><span class="badge badge-rosak">${d.rosak}</span></div>
      <div class="loc-row" style="margin-top:6px"><span>Status</span>
        <span class="badge ${d.rosak>0?'badge-rosak':'badge-ok'}">${d.rosak>0?pct(d.rosak,d.total)+'% rosak':'Semua baik'}</span>
      </div>
    </div>
  `).join('');

  const kawData = kawasanList.map(k => {
    const grp = filtered.filter(d => d.kawasan === k);
    if (!grp.length) return null;
    const t = grp.reduce((s,d)=>s+d.total,0);
    const r = grp.reduce((s,d)=>s+d.rosak,0);
    return {k, t, r};
  }).filter(Boolean);

  document.getElementById('bar-chart').innerHTML = kawData.map(g => `
    <div class="bar-row">
      <div class="bar-label" title="${g.k}">${g.k.replace('KOLEJ ','').replace('FAKULTI ','').replace('ALAM BINA ','AB ').replace('PINTU KEDUA UCS','Pintu Kedua')}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct(g.r,g.t)}%"></div></div>
      <div class="bar-count">${g.r}/${g.t}</div>
    </div>
  `).join('');

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: ['Rosak','Berfungsi'],
      datasets: [{ data: [rosak, baik], backgroundColor: ['#E24B4A','#639922'], borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } }
    }
  });

  document.getElementById('pie-legend').innerHTML = `
    <span style="display:flex;align-items:center;gap:5px">
      <span style="width:10px;height:10px;border-radius:2px;background:#E24B4A;display:inline-block"></span>Rosak: <b>${rosak}</b>
    </span>
    <span style="display:flex;align-items:center;gap:5px">
      <span style="width:10px;height:10px;border-radius:2px;background:#639922;display:inline-block"></span>Berfungsi: <b>${baik}</b>
    </span>
  `;
}

render();
</script>
</body>
</html>
